  # ── Group 5: Resources & Media ───────────────────────────────────────────────

  - name: timeline
    label: Timeline
    folder: src/timeline-data
    create: true
    delete: true
    extension: yml
    format: yaml
    slug: "{{year}}-{{title}}"
    fields:
      - { name: title,       widget: string, label: "Event Title", required: true }
      - { name: year,        widget: number, label: "Year (use negative for BCE, e.g. -399)", required: true }
      - { name: description, widget: text,   label: "Description", required: false }
      - { name: era,         widget: select, label: "Era", options: ["Ancient", "Early Modern", "Enlightenment", "18th Century", "19th Century", "20th Century", "21st Century"], required: false }

  - name: events
    label: Events
    folder: src/events-data
    create: true
    delete: true
    extension: yml
    format: yaml
    slug: "{{date}}-{{name}}"
    fields:
      - { name: name,             widget: string,   label: "Event Name", required: true }
      - { name: date,             widget: datetime, label: "Date", required: true }
      - { name: endDate,          widget: datetime, label: "End Date (optional)", required: false }
      - { name: location,         widget: string,   label: "Location", required: false }
      - { name: region,           widget: select,   label: "Region", options: [National, Northeast, Southeast, Midwest, Southwest, West, Pacific, International, Online], required: false }

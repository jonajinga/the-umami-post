# Decap CMS Configuration
# https://decapcms.org/docs/configuration-options/
#
# Authentication: GitHub PKCE flow (no server required)
# Access control: Cloudflare Zero Trust Access gates /admin/ by email allowlist
# Editorial workflow: all saves create draft PRs; admins merge on GitHub

backend:
  name: github
  repo: jonajinga/the-freethinking-times
  branch: main
  base_url: https://thefreethinkingtimes.com
  auth_endpoint: api/auth

publish_mode: editorial_workflow

media_folder: src/assets/img
public_folder: /assets/img

collections:

  # ── Group 1: Site Configuration ─────────────────────────────────────────────

  - name: site-configuration
    label: Site Configuration
    files:

      - name: site-settings
        label: Site Settings
        file: src/_data/site-settings.json
        fields:
          - { name: title, widget: string, label: "Publication Name", required: true }
          - { name: description, widget: text, label: "Site Description (shown in SEO and social previews)", required: true }
          - { name: tagline, widget: text, label: "Tagline (shown below publication name in the footer)", required: false }
          - { name: author, widget: string, label: "Publication Byline (used in RSS, JSON-LD, etc.)", required: true }
          - { name: email, widget: string, label: "Contact Email Address", required: false }
          - { name: founded, widget: number, label: "Year Founded", required: false }
          - { name: footerByline, widget: string, label: "Footer Byline (overrides the auto-generated 'Founded X. Tagline' text)", required: false }
          - { name: gtranslate, widget: boolean, label: "Enable Google Translate Widget", required: false }
          - name: tipping
            widget: object
            label: "Reader Support Links (Ko-fi, BMAC, or Patreon — first non-empty wins)"
            required: false
            fields:
              - { name: kofi, widget: string, label: "Ko-fi URL", required: false }
              - { name: bmac, widget: string, label: "Buy Me A Coffee URL", required: false }
              - { name: patreon, widget: string, label: "Patreon URL", required: false }
          - name: newsletter
            widget: object
            label: "Newsletter (Buttondown)"
            required: false
            fields:
              - { name: provider, widget: string, label: "Provider (enter: buttondown)", required: false }
              - { name: username, widget: string, label: "Buttondown Username", required: false }
          - name: social
            widget: object
            label: "Social Media Links"
            required: false
            fields:
              - { name: twitter, widget: string, label: "Twitter / X URL", required: false }
              - { name: mastodon, widget: string, label: "Mastodon URL", required: false }
              - { name: rss, widget: string, label: "RSS Feed Path (default: /feed.xml)", required: false }
          - name: subscribe
            widget: object
            label: "Newsletter Subscribe Block Copy"
            required: false
            fields:
              - { name: eyebrow,       widget: string, label: "Eyebrow Line (inline newsletter block)", required: false }
              - { name: heading,       widget: string, label: "Heading (inline newsletter block)", required: false }
              - { name: body,          widget: text,   label: "Body Copy (inline newsletter block)", required: false }
              - { name: notice,        widget: string, label: "Notice Line (below the signup form)", required: false }
              - { name: sidebarBody,   widget: string, label: "Sidebar Widget Copy", required: false }
              - { name: footerHeading, widget: string, label: "Footer Block Heading", required: false }
              - { name: footerBody,    widget: string, label: "Footer Block Body Copy", required: false }
          - name: contactSubjects
            widget: list
            label: "Contact Form Subject Options"
            required: false
            field: { name: subject, widget: string }

      - name: nav
        label: Main Navigation
        file: src/_data/nav.json
        fields:
          - name: items
            widget: list
            label: "Navigation Items"
            fields:
              - { name: label, widget: string, label: "Link Label", required: true }
              - { name: url, widget: string, label: "URL", required: true }
              - { name: key, widget: string, label: "Unique Key (slug, no spaces — used for dropdown IDs)", required: true }
              - { name: collection, widget: string, label: "Eleventy Collection Name (e.g. news, opinion) — enables section dropdown", required: false }
              - { name: type, widget: string, label: "Special Type: 'more' (mega-menu) or 'library'", required: false }

      - name: footerLinks
        label: Footer Navigation
        file: src/_data/footerLinks.json
        fields:
          - name: items
            widget: list
            label: "Footer Columns"
            fields:
              - { name: heading, widget: string, label: "Column Heading", required: true }
              - { name: headingUrl, widget: string, label: "Heading URL (optional — makes the heading a link)", required: false }
              - name: links
                widget: list
                label: "Links"
                fields:
                  - { name: label, widget: string, label: "Link Text", required: true }
                  - { name: url, widget: string, label: "URL", required: true }
                  - { name: title, widget: string, label: "Tooltip (title attribute)", required: false }

      - name: megaMenu
        label: '"More" Mega Menu'
        file: src/_data/megaMenu.json
        fields:
          - name: items
            widget: list
            label: "Columns"
            fields:
              - { name: heading, widget: string, label: "Column Heading", required: true }
              - name: links
                widget: list
                label: "Links"
                fields:
                  - { name: title, widget: string, label: "Link Title", required: true }
                  - { name: url, widget: string, label: "URL", required: true }
                  - { name: desc, widget: string, label: "Short Description (shown below the link title)", required: false }

      - name: drawerLinks
        label: Mobile Drawer Navigation
        file: src/_data/drawerLinks.json
        fields:
          - name: items
            widget: list
            label: "Link Groups"
            fields:
              - { name: heading, widget: string, label: "Section Heading (leave blank for no heading)", required: false }
              - { name: showSupportBadgeAfter, widget: boolean, label: "Show Support Badge After This Group", required: false }
              - { name: small, widget: boolean, label: "Use Small Link Style", required: false }
              - name: links
                widget: list
                label: "Links"
                fields:
                  - { name: label, widget: string, label: "Link Text", required: true }
                  - { name: url, widget: string, label: "URL", required: true }

      - name: aboutContent
        label: About Page Content
        file: src/_data/aboutContent.json
        fields:
          - name: whatWeAre
            widget: list
            label: "What We Are"
            field: { name: paragraph, widget: text }
          - name: whyWeExist
            widget: list
            label: "Why We Exist"
            field: { name: paragraph, widget: text }
          - name: whatWeStandFor
            widget: list
            label: "What We Stand For"
            field: { name: paragraph, widget: text }
          - name: whatWeWillNotDo
            widget: list
            label: "What We Will Not Do"
            field: { name: paragraph, widget: text }

      - name: supportContent
        label: Support Page Content
        file: src/_data/supportContent.json
        fields:
          - { name: headerHeading,        widget: string, label: "Page Heading", required: true }
          - { name: headerSubtitle,       widget: text,   label: "Header Subtitle (italic intro)", required: false }
          - name: howFunded
            widget: list
            label: "How We're Funded"
            field: { name: paragraph, widget: text }
          - name: whereSupportGoes
            widget: list
            label: "Where Your Support Goes"
            field: { name: paragraph, widget: text }
          - { name: publicationBlockBody, widget: text,   label: "Publication Support Block Body", required: true }
          - { name: authorBlockBody,      widget: text,   label: "Author Support Block Body", required: true }
          - { name: nobudgetHeading,      widget: string, label: "Subscribe-Instead Heading", required: true }
          - { name: nobudgetBody,         widget: text,   label: "Subscribe-Instead Body", required: true }
          - { name: closingNote,          widget: text,   label: "Footer Closing Note (displayed in italics)", required: false }

      - name: contributeContent
        label: Contribute Page Content
        file: src/_data/contributeContent.json
        fields:
          - name: tiers
            widget: list
            label: "Contributor Tiers"
            fields:
              - { name: name, widget: string, label: "Tier Name", required: true }
              - { name: desc, widget: text,   label: "Description", required: false }
          - name: lookingFor
            widget: list
            label: "What We Look For"
            field: { name: item, widget: string }
          - name: topics
            widget: list
            label: "Topics of Particular Interest"
            field: { name: item, widget: string }
          - name: otherWays
            widget: list
            label: "Other Ways to Contribute"
            fields:
              - { name: label, widget: string, label: "Link Text", required: true }
              - { name: url,   widget: string, label: "URL", required: true }
          - name: writingStyle
            widget: list
            label: "Writing Style Guidelines"
            field: { name: item, widget: string }

      - name: profiles
        label: Content Profiles
        file: src/_data/profiles.json
        fields:
          - name: standard
            widget: object
            label: "Standard Article"
            fields:
              - { name: label, widget: string, label: "Label" }
              - { name: description, widget: text, label: "Description", required: false }
              - { name: icon, widget: string, label: "Icon", required: false }
          - name: interview
            widget: object
            label: "Interview / Q&A"
            fields:
              - { name: label, widget: string, label: "Label" }
              - { name: description, widget: text, label: "Description", required: false }
              - { name: icon, widget: string, label: "Icon", required: false }
              - { name: badge, widget: string, label: "Badge", required: false }
          - name: longread
            widget: object
            label: "Long-form Investigation"
            fields:
              - { name: label, widget: string, label: "Label" }
              - { name: description, widget: text, label: "Description", required: false }
              - { name: icon, widget: string, label: "Icon", required: false }
              - { name: badge, widget: string, label: "Badge", required: false }
              - { name: minReadingMinutes, widget: number, label: "Minimum Reading Minutes", required: false }
          - name: photoessay
            widget: object
            label: "Photo Essay"
            fields:
              - { name: label, widget: string, label: "Label" }
              - { name: description, widget: text, label: "Description", required: false }
              - { name: icon, widget: string, label: "Icon", required: false }
              - { name: badge, widget: string, label: "Badge", required: false }
              - { name: fullBleed, widget: boolean, label: "Full Bleed", required: false }
          - name: podcast
            widget: object
            label: "Podcast Episode"
            fields:
              - { name: label, widget: string, label: "Label" }
              - { name: description, widget: text, label: "Description", required: false }
              - { name: icon, widget: string, label: "Icon", required: false }
              - { name: badge, widget: string, label: "Badge", required: false }
              - { name: requiresAudio, widget: boolean, label: "Requires Audio", required: false }
          - name: datavisualization
            widget: object
            label: "Data Visualization"
            fields:
              - { name: label, widget: string, label: "Label" }
              - { name: description, widget: text, label: "Description", required: false }
              - { name: icon, widget: string, label: "Icon", required: false }
              - { name: badge, widget: string, label: "Badge", required: false }
          - name: brief
            widget: object
            label: "Brief"
            fields:
              - { name: label, widget: string, label: "Label" }
              - { name: description, widget: text, label: "Description", required: false }
              - { name: icon, widget: string, label: "Icon", required: false }
              - { name: badge, widget: string, label: "Badge", required: false }
              - { name: maxReadingMinutes, widget: number, label: "Maximum Reading Minutes", required: false }
          - name: explainer
            widget: object
            label: "Explainer"
            fields:
              - { name: label, widget: string, label: "Label" }
              - { name: description, widget: text, label: "Description", required: false }
              - { name: icon, widget: string, label: "Icon", required: false }
              - { name: badge, widget: string, label: "Badge", required: false }

  # ── Group 2: Authors ─────────────────────────────────────────────────────────

  - name: authors
    label: Authors
    folder: src/authors-data
    create: true
    delete: true
    extension: yml
    format: yaml
    slug: "{{slug}}"
    identifier_field: slug
    fields:
      - { name: slug, widget: string, label: "Slug (e.g. jane-doe — used in articles and author page URL)", required: true }
      - { name: name, widget: string, label: "Display Name", required: true }
      - { name: role, widget: string, label: "Role (e.g. Founding Editor, Staff Reporter)", required: false }
      - { name: title, widget: string, label: "Professional Title", required: false }
      - { name: location, widget: string, label: "Location (e.g. Denver, Colorado)", required: false }
      - { name: bio, widget: text, label: "Short Bio (shown in byline tooltips)", required: false }
      - { name: bioLong, widget: markdown, label: "Full Bio (shown on author page)", required: false }
      - { name: photo, widget: image, label: "Author Photo", required: false }
      - name: social
        widget: object
        label: "Social Media Links"
        required: false
        fields:
          - { name: x,         widget: string, label: "X / Twitter URL", required: false }
          - { name: bluesky,   widget: string, label: "Bluesky URL", required: false }
          - { name: mastodon,  widget: string, label: "Mastodon URL", required: false }
          - { name: linkedin,  widget: string, label: "LinkedIn URL", required: false }
          - { name: github,    widget: string, label: "GitHub URL", required: false }
          - { name: threads,   widget: string, label: "Threads URL", required: false }
          - { name: instagram, widget: string, label: "Instagram URL", required: false }
          - { name: website,   widget: string, label: "Personal Website URL", required: false }
          - { name: email,     widget: string, label: "Public Email Address", required: false }
      - name: tipping
        widget: object
        label: "Support / Donation Links"
        required: false
        fields:
          - { name: kofi,    widget: string, label: "Ko-fi URL", required: false }
          - { name: bmac,    widget: string, label: "Buy Me A Coffee URL", required: false }
          - { name: patreon, widget: string, label: "Patreon URL", required: false }

  # ── Group 3: Write Articles ──────────────────────────────────────────────────

  - name: news
    label: News
    folder: src/content/news
    create: true
    delete: true
    slug: "{{title}}"
    fields:
      - { name: layout,     widget: hidden, default: article }
      - { name: section,     widget: hidden, default: News }
      - { name: subsection,  widget: select, label: "Subsection", required: false, hint: "Optional — groups this article within News", options: ["U.S.", "World", "Politics", "Local", "Climate", "Education", "Health"] }
      - { name: title,      widget: string, label: "Title", required: true }
      - { name: description, widget: text,  label: "Description (shown in search results and social previews)", required: false }
      - { name: author,     widget: string, label: "Author Slug (must match an entry in Authors)", default: jon-ajinga, required: false }
      - { name: authorName, widget: string, label: "Author Display Name", default: "Jon Ajinga", required: false }
      - { name: date,       widget: datetime, label: "Publish Date", required: true }
      - { name: updated,    widget: datetime, label: "Last Updated Date (optional)", required: false }
      - { name: image,      widget: image,  label: "Cover Image", required: false }
      - { name: imageAlt,   widget: string, label: "Image Alt Text (required for accessibility)", required: false }
      - { name: tags,       widget: list,   label: "Tags", required: false, field: { name: tag, widget: string } }
      - { name: profile,    widget: select, label: "Content Format", options: [standard, interview, longread, photoessay, podcast, datavisualization, brief, explainer], default: standard, required: false }
      - { name: audioUrl,   widget: string, label: "Audio URL (podcast format only)", required: false }
      - { name: embedUrl,   widget: string, label: "Embed URL (data visualisation format only)", required: false }
      - { name: series,     widget: string, label: "Series Title (optional)", required: false }
      - { name: seriesPart, widget: number, label: "Part Number in Series", required: false }
      - { name: location,   widget: string, label: "Dateline (e.g. Denver, Colorado)", required: false }
      - { name: edition,    widget: number, label: "Edition Number", required: false }
      - { name: featured,   widget: boolean, label: "Featured", default: false, required: false }
      - { name: draft,      widget: boolean, label: "Draft", default: true, required: false }
      - { name: status,     widget: select, label: "Status", options: [pitched, drafting, review, scheduled, published, spiked], default: drafting, required: false, hint: "Editorial workflow column on /editorial/board/. Future-dated pieces auto-read as scheduled regardless." }
      - { name: editor,     widget: string, label: "Editor (author slug)", required: false, hint: "Slug of the editor responsible for this piece. Surfaces on the Editorial Board card as 'ed: …'." }
      - { name: reviewer,   widget: string, label: "Reviewer (author slug)", required: false, hint: "Slug of the reviewer doing the read. Surfaces on the Editorial Board card as 'rv: …'." }
      - { name: lastStatusChange, widget: datetime, label: "Last Status Change", required: false, hint: "Bumped when the article moves columns. Drives the stuck-card amber/red dots after 7 / 14 days." }
      - { name: pitchedDate, widget: datetime, label: "Pitched Date", required: false, hint: "When the piece entered the pipeline. Used for pipeline-length stats." }
      - { name: spikedReason, widget: text, label: "Spiked Reason", required: false, hint: "If status is spiked: short note for the team about why the piece was held or killed. Surfaces on the spiked-column card." }
      - { name: responseTo, widget: string, label: "Response To (URL of the article this replies to)", required: false }
      - { name: emailOnly,  widget: boolean, label: "Email Only (newsletter — no public page)", default: false, required: false }
      - { name: assignedTo, widget: string, label: "Assigned To (author slug)", required: false }
      - { name: dueDate,    widget: datetime, label: "Due Date", required: false }
      - name: corrections
        widget: list
        label: "Corrections"
        fields:
          - { name: description, widget: text, label: "What Was Corrected", required: false }
          - { name: date,        widget: datetime, label: "Correction Date", required: false }
      - name: attachments
        widget: list
        label: "File Attachments"
        fields:
          - { name: name,        widget: string, label: "File Name", required: false }
          - { name: path,        widget: string, label: "File Path or URL", required: true }
          - { name: description, widget: string, label: "Description", required: false }
      - { name: body, widget: markdown, label: "Article Body" }

  - name: opinion
    label: Opinion
    folder: src/content/opinion
    create: true
    delete: true
    slug: "{{title}}"
    fields:
      - { name: layout,     widget: hidden, default: article }
      - { name: section,     widget: hidden, default: Opinion }
      - { name: subsection,  widget: select, label: "Subsection", required: false, hint: "Optional — groups this article within Opinion", options: ["Editorials", "Columns", "Letters to the Editor", "Guest Essays"] }
      - { name: title,      widget: string, label: "Title", required: true }
      - { name: description, widget: text,  label: "Description (shown in search results and social previews)", required: false }
      - { name: author,     widget: string, label: "Author Slug (must match an entry in Authors)", default: jon-ajinga, required: false }
      - { name: authorName, widget: string, label: "Author Display Name", default: "Jon Ajinga", required: false }
      - { name: date,       widget: datetime, label: "Publish Date", required: true }
      - { name: updated,    widget: datetime, label: "Last Updated Date (optional)", required: false }
      - { name: image,      widget: image,  label: "Cover Image", required: false }
      - { name: imageAlt,   widget: string, label: "Image Alt Text (required for accessibility)", required: false }
      - { name: tags,       widget: list,   label: "Tags", required: false, field: { name: tag, widget: string } }
      - { name: profile,    widget: select, label: "Content Format", options: [standard, interview, longread, photoessay, podcast, datavisualization, brief, explainer], default: standard, required: false }
      - { name: audioUrl,   widget: string, label: "Audio URL (podcast format only)", required: false }
      - { name: embedUrl,   widget: string, label: "Embed URL (data visualisation format only)", required: false }
      - { name: series,     widget: string, label: "Series Title (optional)", required: false }
      - { name: seriesPart, widget: number, label: "Part Number in Series", required: false }
      - { name: location,   widget: string, label: "Dateline (e.g. Denver, Colorado)", required: false }
      - { name: edition,    widget: number, label: "Edition Number", required: false }
      - { name: featured,   widget: boolean, label: "Featured", default: false, required: false }
      - { name: draft,      widget: boolean, label: "Draft", default: true, required: false }
      - { name: status,     widget: select, label: "Status", options: [pitched, drafting, review, scheduled, published, spiked], default: drafting, required: false, hint: "Editorial workflow column on /editorial/board/. Future-dated pieces auto-read as scheduled regardless." }
      - { name: editor,     widget: string, label: "Editor (author slug)", required: false, hint: "Slug of the editor responsible for this piece. Surfaces on the Editorial Board card as 'ed: …'." }
      - { name: reviewer,   widget: string, label: "Reviewer (author slug)", required: false, hint: "Slug of the reviewer doing the read. Surfaces on the Editorial Board card as 'rv: …'." }
      - { name: lastStatusChange, widget: datetime, label: "Last Status Change", required: false, hint: "Bumped when the article moves columns. Drives the stuck-card amber/red dots after 7 / 14 days." }
      - { name: pitchedDate, widget: datetime, label: "Pitched Date", required: false, hint: "When the piece entered the pipeline. Used for pipeline-length stats." }
      - { name: spikedReason, widget: text, label: "Spiked Reason", required: false, hint: "If status is spiked: short note for the team about why the piece was held or killed. Surfaces on the spiked-column card." }
      - { name: responseTo, widget: string, label: "Response To (URL of the article this replies to)", required: false }
      - { name: emailOnly,  widget: boolean, label: "Email Only (newsletter — no public page)", default: false, required: false }
      - { name: assignedTo, widget: string, label: "Assigned To (author slug)", required: false }
      - { name: dueDate,    widget: datetime, label: "Due Date", required: false }
      - name: corrections
        widget: list
        label: "Corrections"
        fields:
          - { name: description, widget: text, label: "What Was Corrected", required: false }
          - { name: date,        widget: datetime, label: "Correction Date", required: false }
      - name: attachments
        widget: list
        label: "File Attachments"
        fields:
          - { name: name,        widget: string, label: "File Name", required: false }
          - { name: path,        widget: string, label: "File Path or URL", required: true }
          - { name: description, widget: string, label: "Description", required: false }
      - { name: body, widget: markdown, label: "Article Body" }

  - name: analysis
    label: Analysis
    folder: src/content/analysis
    create: true
    delete: true
    slug: "{{title}}"
    fields:
      - { name: layout,     widget: hidden, default: article }
      - { name: section,     widget: hidden, default: Analysis }
      - { name: subsection,  widget: select, label: "Subsection", required: false, hint: "Optional — groups this article within Analysis", options: ["Data", "Explainers", "Context", "Deep Dives"] }
      - { name: title,      widget: string, label: "Title", required: true }
      - { name: description, widget: text,  label: "Description (shown in search results and social previews)", required: false }
      - { name: author,     widget: string, label: "Author Slug (must match an entry in Authors)", default: jon-ajinga, required: false }
      - { name: authorName, widget: string, label: "Author Display Name", default: "Jon Ajinga", required: false }
      - { name: date,       widget: datetime, label: "Publish Date", required: true }
      - { name: updated,    widget: datetime, label: "Last Updated Date (optional)", required: false }
      - { name: image,      widget: image,  label: "Cover Image", required: false }
      - { name: imageAlt,   widget: string, label: "Image Alt Text (required for accessibility)", required: false }
      - { name: tags,       widget: list,   label: "Tags", required: false, field: { name: tag, widget: string } }
      - { name: profile,    widget: select, label: "Content Format", options: [standard, interview, longread, photoessay, podcast, datavisualization, brief, explainer], default: standard, required: false }
      - { name: audioUrl,   widget: string, label: "Audio URL (podcast format only)", required: false }
      - { name: embedUrl,   widget: string, label: "Embed URL (data visualisation format only)", required: false }
      - { name: series,     widget: string, label: "Series Title (optional)", required: false }
      - { name: seriesPart, widget: number, label: "Part Number in Series", required: false }
      - { name: location,   widget: string, label: "Dateline (e.g. Denver, Colorado)", required: false }
      - { name: edition,    widget: number, label: "Edition Number", required: false }
      - { name: featured,   widget: boolean, label: "Featured", default: false, required: false }
      - { name: draft,      widget: boolean, label: "Draft", default: true, required: false }
      - { name: status,     widget: select, label: "Status", options: [pitched, drafting, review, scheduled, published, spiked], default: drafting, required: false, hint: "Editorial workflow column on /editorial/board/. Future-dated pieces auto-read as scheduled regardless." }
      - { name: editor,     widget: string, label: "Editor (author slug)", required: false, hint: "Slug of the editor responsible for this piece. Surfaces on the Editorial Board card as 'ed: …'." }

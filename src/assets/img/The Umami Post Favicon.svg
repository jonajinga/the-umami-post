<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="The Umami Post">
  <defs>
    <!-- Hand-drawn roughening filter -->
    <filter id="rough" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4"/>
    </filter>

    <!-- Mushroom silhouette (taller version) -->
    <path id="mushroom" d="
      M 78 263
      C 80 174 122 68 258 70
      C 392 72 438 178 434 267
      C 434 291 420 297 400 295
      L 352 295
      L 354 440
      Q 354 460 330 464
      Q 256 470 182 463
      Q 160 460 158 440
      L 160 295
      L 112 293
      C 92 293 76 289 78 263
      Z
    "/>
    <clipPath id="mushroom-clip"><use href="#mushroom"/></clipPath>

    <!-- Cap-only shape (for clipping the rough-fill effect) -->
    <path id="cap-shape" d="
      M 78 263
      C 80 174 122 68 258 70
      C 392 72 438 178 434 267
      C 434 291 420 297 400 295
      L 112 293
      C 92 293 76 289 78 263
      Z
    "/>
    <clipPath id="cap-clip"><use href="#cap-shape"/></clipPath>

    <!-- Two cap spots: larger upper-left, smaller lower-right -->
    <path id="spot-a" d="
      M 212 142
      C 192 142 180 154 184 170
      C 188 186 204 192 222 190
      C 240 188 250 174 244 158
      C 238 146 226 142 212 142 Z
    "/>
    <clipPath id="spot-a-clip"><use href="#spot-a"/></clipPath>

    <path id="spot-b" d="
      M 320 217
      C 304 218 296 228 300 238
      C 304 248 318 251 330 248
      C 342 245 346 234 340 224
      C 336 218 328 216 320 217 Z
    "/>
    <clipPath id="spot-b-clip"><use href="#spot-b"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="88" ry="88" fill="#F0E1C5"/>

  <g filter="url(#rough)">
    <!-- Stem fill (full silhouette, cream) -->
    <use href="#mushroom" fill="#F4E7CC"/>

    <!-- Cap with rough-fill: orange interior with a cream "underfill" ring  -->
    <!-- (stroke is on the same color as stem fill, clipped to cap area, so it eats inward from the outline) -->
    <g clip-path="url(#cap-clip)">
      <use href="#cap-shape" fill="#D67A3D" stroke="#F4E7CC" stroke-width="22"/>
    </g>

    <!-- Single-direction diagonal stripes covering entire stem -->
    <g clip-path="url(#mushroom-clip)" stroke="#8A6D2E" stroke-width="9" stroke-linecap="round" fill="none">
      <path d="M 90 280 Q 132 380 178 480"/>
      <path d="M 130 280 Q 172 380 218 480"/>
      <path d="M 170 280 Q 212 380 258 480"/>
      <path d="M 210 280 Q 252 380 298 480"/>
      <path d="M 250 280 Q 292 380 338 480"/>
      <path d="M 290 280 Q 332 380 378 480"/>
      <path d="M 330 280 Q 372 380 418 480"/>
      <path d="M 370 280 Q 412 380 458 480"/>
    </g>

    <!-- Spots with rough-fill: cream interior with orange "underfill" ring -->
    <g clip-path="url(#spot-a-clip)">
      <use href="#spot-a" fill="#F4E7CC" stroke="#D67A3D" stroke-width="12"/>
    </g>
    <g clip-path="url(#spot-b-clip)">
      <use href="#spot-b" fill="#F4E7CC" stroke="#D67A3D" stroke-width="10"/>
    </g>

    <!-- Spot dark outlines (on top, so the rough-fill ring shows just inside) -->
    <use href="#spot-a" fill="none" stroke="#2A1F15" stroke-width="5"/>
    <use href="#spot-b" fill="none" stroke="#2A1F15" stroke-width="5"/>

    <!-- Cap-stem junction line (thin so the cream rough-fill gap stays visible above it) -->
    <line x1="160" y1="295" x2="352" y2="295" stroke="#2A1F15" stroke-width="9" stroke-linecap="round"/>

    <!-- Mushroom silhouette outline -->
    <use href="#mushroom" fill="none" stroke="#2A1F15" stroke-width="13" stroke-linejoin="round" stroke-linecap="round"/>
  </g>
</svg>

quote: >-
  Is God willing to prevent evil, but not able? Then he is not omnipotent. Is he able, but not willing? Then he is
  malevolent. Is he both able and willing? Then whence cometh evil? Is he neither able nor willing? Then why call him
  God?
author: Epicurus
source: attributed (c. 300 BCE)
tags:
  - philosophy
  - religion
era: Ancient

quote: >-
  Every cradle asks us 'Whence?' and every coffin 'Whither?' The poor barbarian, weeping above his dead, can answer
  these questions just as well as the robed priest of the most authentic creed.
author: Robert G. Ingersoll
source: The Gods (1872)
tags:
  - freethought
  - religion
era: 19th Century

name: Feature Request
description: Suggest an improvement to the site, reader tools, or publishing infrastructure.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. The most useful feature requests explain the
        **problem** they solve, not just the solution — it helps us evaluate whether
        there's a better way to solve the same problem.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation where this would help. Who runs into this, and when?
      placeholder: |
        When I'm reading a long Analysis piece and want to come back to it later,
        there's no way to save my scroll position. I have to find my place again
        every time I return to the article.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? Be as specific as you can.
      placeholder: |
        Save reading position per article in localStorage. When I return to
        an article URL, automatically scroll to where I left off and show a
        "Resume reading" banner with an option to start from the top instead.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Have you thought of other ways to address this? Why do you prefer your proposal?
    validations:
      required: false

  - type: dropdown
    id: audience
    attributes:
      label: Who does this primarily serve?
      options:
        - Readers
        - Writers and journalists
        - Editors and staff
        - Developers
        - All of the above
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have — minor quality-of-life improvement
        - Would significantly improve my workflow
        - Blocking a real use case I have right now
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing open and closed issues and this hasn't been requested.
          required: true
        - label: This isn't already covered by a Pages CMS feature or a config change in site-settings.json.
          required: false
